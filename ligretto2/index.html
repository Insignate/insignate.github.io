<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A modern, premium score tracker for the Ligretto card game. Keep track of players, rounds, and scores with a glassmorphic interface.">
    <meta name="author" content="Insignate">
    <title>Ligretto 2 | Premium Score Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/script.js" defer></script>
</head>
<body>
    <div id="app" class="app-container">
        <!-- Setup View -->
        <section id="setup-view" class="view active">
            <div class="glass-card setup-card">
                <header>
                    <h1 class="logo">LIGRETTO <span class="accent">2</span></h1>
                    <p class="subtitle">Start a new game with your friends</p>
                </header>
                <form id="setup-form" class="setup-form">
                    <div class="input-group">
                        <label for="player-count">How many players?</label>
                        <input type="number" id="player-count" min="1" max="12" value="4" required>
                    </div>
                    <button type="submit" class="btn primary-btn">Create Game</button>
                </form>
            </div>
        </section>

        <!-- Game View -->
        <section id="game-view" class="view">
            <header class="game-header">
                <div class="header-left">
                    <h2 class="round-display">Round <span id="round-number">1</span></h2>
                </div>
                <div class="header-right">
                    <button id="new-game-btn" class="btn secondary-btn small-btn">New Game</button>
                    <button id="reset-game" class="btn icon-btn" title="Reset All Scores">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
                    </button>
                </div>
            </header>

            <div id="players-list" class="players-grid">
                <!-- Players will be injected here -->
            </div>

            <div class="game-actions">
                <button id="calc-all" class="btn primary-btn">Calculate Round</button>
                <div class="undo-redo-group">
                    <button id="undo-round" class="btn secondary-btn" disabled>Undo</button>
                    <button id="redo-round" class="btn secondary-btn" disabled>Redo</button>
                </div>
            </div>
        </section>
    </div>

    <!-- UI Templates -->
    <template id="player-card-template">
        <div class="glass-card player-card" data-player-id="">
            <div class="player-info">
                <input type="text" class="player-name-input" placeholder="Player Name" maxlength="12">
                <div class="player-score-badge">0</div>
            </div>
            <div class="score-input-container">
                <label>Points this round</label>
                <div class="input-wrapper">
                    <input type="number" class="round-points-input" placeholder="0" step="1">
                    <button class="add-points-btn">Add</button>
                </div>
            </div>
            <div class="player-color-picker">
                <!-- Colors will be added here -->
            </div>
        </div>
    </template>
</body>
</html>
